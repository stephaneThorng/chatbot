<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Corebot Chat</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #f4f6f8;
        color: #1f2933;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        min-height: 100%;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(760px, 100%);
        height: min(720px, calc(100% - 48px));
        display: grid;
        grid-template-rows: auto 1fr auto;
        overflow: hidden;
        border: 1px solid #d8dee6;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 18px 42px rgba(23, 31, 45, 0.12);
      }

      header {
        padding: 18px 20px;
        border-bottom: 1px solid #e6eaf0;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
      }

      .session {
        min-height: 18px;
        margin-top: 6px;
        color: #697586;
        font-size: 13px;
      }

      .thread {
        display: flex;
        flex-direction: column;
        gap: 12px;
        overflow-y: auto;
        padding: 20px;
        background: #f8fafc;
      }

      .message {
        max-width: min(78%, 560px);
        padding: 12px 14px;
        border-radius: 8px;
        line-height: 1.45;
        overflow-wrap: anywhere;
        white-space: pre-wrap;
      }

      .message.user {
        align-self: flex-end;
        background: #1f6feb;
        color: #ffffff;
      }

      .message.bot {
        align-self: flex-start;
        border: 1px solid #d8dee6;
        background: #ffffff;
      }

      .message.error {
        align-self: center;
        max-width: 100%;
        border: 1px solid #f0b8b8;
        background: #fff5f5;
        color: #a33b3b;
      }

      form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        padding: 16px;
        border-top: 1px solid #e6eaf0;
        background: #ffffff;
      }

      input {
        width: 100%;
        min-width: 0;
        border: 1px solid #c7d0dd;
        border-radius: 8px;
        padding: 12px 14px;
        font: inherit;
      }

      input:focus {
        border-color: #1f6feb;
        outline: 3px solid rgba(31, 111, 235, 0.16);
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 0 18px;
        background: #1f2933;
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      @media (max-width: 560px) {
        body {
          padding: 0;
          display: block;
        }

        main {
          width: 100%;
          height: 100%;
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          border: 0;
          border-radius: 0;
          grid-template-rows: auto 1fr auto;
        }

        .thread {
          overflow-y: auto;
          -webkit-overflow-scrolling: touch;
        }

        form {
          grid-template-columns: 1fr auto;
          padding: 10px 12px;
          padding-bottom: max(10px, env(safe-area-inset-bottom));
        }

        input {
          font-size: 16px; /* prevent iOS zoom */
        }

        button {
          min-height: 44px;
          padding: 0 14px;
        }

        .message {
          max-width: 90%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Corebot Chat</h1>
        <div id="session" class="session">Nouvelle session</div>
      </header>

      <section id="thread" class="thread" aria-live="polite"></section>

      <form id="chat-form">
        <input
          id="message"
          name="message"
          type="text"
          autocomplete="off"
          placeholder="Ecrire un message..."
          required
        />
        <button id="send-button" type="submit">Envoyer</button>
      </form>
    </main>

    <script>
      const isBackendOrigin =
        window.location.hostname === "localhost" && window.location.port === "3000";
      const API_URL = isBackendOrigin
        ? "/api/v1/conversation/send_message"
        : "https://version-guts-audition.ngrok-free.dev/api/v1/conversation/send_message";

      const form = document.querySelector("#chat-form");
      const input = document.querySelector("#message");
      const thread = document.querySelector("#thread");
      const sendButton = document.querySelector("#send-button");
      const sessionLabel = document.querySelector("#session");

      let sessionId = null;

      function appendMessage(author, text) {
        const message = document.createElement("div");
        message.className = `message ${author}`;
        message.textContent = text;
        thread.appendChild(message);
        thread.scrollTop = thread.scrollHeight;
      }

      function updateSessionLabel() {
        sessionLabel.textContent = sessionId ? `Session: ${sessionId}` : "Nouvelle session";
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const message = input.value.trim();
        if (!message) {
          return;
        }

        appendMessage("user", message);
        input.value = "";
        input.focus();
        sendButton.disabled = true;

        try {
          const response = await fetch(API_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              message,
              session_id: sessionId,
            }),
          });

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const data = await response.json();
          sessionId = data.session_id;
          updateSessionLabel();
          appendMessage("bot", data.reply);
        } catch (error) {
          appendMessage(
            "error",
            `Impossible d'envoyer le message. Verifiez que le backend est demarre sur localhost:3000. (${error.message})`,
          );
        } finally {
          sendButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
